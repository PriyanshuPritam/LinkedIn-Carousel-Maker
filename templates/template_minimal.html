<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel Slide - Minimal</title>
  <style>
    :root {
      --brand-primary: {{brand_primary | default: "#111827"}};
      --brand-accent: {{brand_accent | default: "#2563EB"}};
      --brand-bg: {{brand_bg | default: "#FFFFFF"}};
      --font-family: {{font_family | default: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"}};
    }

    html, body {
      margin: 0; padding: 0; width: 1080px; height: 1080px; background: var(--brand-bg); color: #0b0b0b; font-family: var(--font-family);
    }

    .canvas { position: relative; box-sizing: border-box; width: 1080px; height: 1080px; padding: 96px; display: flex; flex-direction: column; }

    .title { font-size: 84px; line-height: 1.08; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 28px 0; color: var(--brand-primary); }

    .rule { width: 120px; height: 8px; background: var(--brand-accent); border-radius: 999px; margin: 6px 0 24px 0; }

    .bullets { list-style: none; padding: 0; margin: 16px 0 0 0; display: grid; gap: 20px; }

    .bullet { display: grid; grid-template-columns: 18px 1fr; gap: 16px; align-items: start; font-size: 36px; line-height: 1.4; color: #111827; }

    .bullet .tick { width: 12px; height: 12px; margin-top: 14px; border-radius: 2px; background: var(--brand-accent); }

    .footer { position: absolute; bottom: 64px; left: 96px; right: 96px; display: flex; align-items: center; justify-content: space-between; color: #4b5563; font-size: 28px; }

    .brand { color: var(--brand-primary); font-weight: 600; }

    .page { color: #6b7280; }
  </style>
</head>
<body>
  <div class="canvas">
    <h1 class="title">{{slide_title}}</h1>
    <div class="rule"></div>

    <ul class="bullets">
      {% if bullet_1 %}
      <li class="bullet"><span class="tick"></span><span>{{bullet_1}}</span></li>
      {% endif %}
      {% if bullet_2 %}
      <li class="bullet"><span class="tick"></span><span>{{bullet_2}}</span></li>
      {% endif %}
      {% if bullet_3 %}
      <li class="bullet"><span class="tick"></span><span>{{bullet_3}}</span></li>
      {% endif %}
    </ul>

    <div class="footer">
      <span class="brand">{{brand_tagline | default: "@brand"}}</span>
      <span class="page">{{slide_number | default: 1}} / {{total_slides | default: 8}}</span>
    </div>
  </div>
</body>
</html>
