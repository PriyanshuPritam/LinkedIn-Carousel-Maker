<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carousel Slide - Bold</title>
  <style>
    :root {
      --brand-primary: {{brand_primary | default: "#111111"}};
      --brand-accent: {{brand_accent | default: "#FF3B3B"}};
      --brand-bg: {{brand_bg | default: "#0A0A0A"}};
      --font-family: {{font_family | default: "Manrope, Inter, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"}};
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 1080px;
      height: 1080px;
      background: var(--brand-bg);
      color: #ffffff;
      font-family: var(--font-family);
    }

    .canvas {
      position: relative;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      padding: 96px 84px 84px 84px;
      width: 1080px;
      height: 1080px;
    }

    .ribbon {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 18px;
      background: linear-gradient(90deg, var(--brand-accent), #ff8a00);
      box-shadow: 0 8px 24px rgba(255, 59, 59, 0.35);
    }

    .title {
      font-size: 96px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: -0.03em;
      margin: 24px 0 36px 0;
    }

    .bullets { list-style: none; padding: 0; margin: 24px 0 0 0; display: grid; gap: 26px; }

    .bullet { display: grid; grid-template-columns: 40px 1fr; gap: 18px; align-items: start; font-size: 40px; line-height: 1.3; }

    .bullet .icon {
      width: 28px; height: 28px; margin-top: 10px; border: 4px solid var(--brand-accent); border-radius: 6px;
      box-shadow: inset 0 0 0 4px rgba(255,255,255,0.05), 0 0 0 6px rgba(255, 59, 59, 0.2);
    }

    .footer {
      position: absolute;
      bottom: 48px; left: 84px; right: 84px;
      display: flex; align-items: center; justify-content: space-between;
      color: rgba(255,255,255,0.85); font-size: 30px;
    }

    .badge { background: rgba(255,255,255,0.06); padding: 10px 16px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.12); }

    .pagination { display: inline-flex; align-items: center; gap: 12px; }

    .dot { width: 12px; height: 12px; border-radius: 50%; background: var(--brand-accent); }
  </style>
</head>
<body>
  <div class="canvas">
    <div class="ribbon"></div>
    <h1 class="title">{{slide_title}}</h1>

    <ul class="bullets">
      {% if bullet_1 %}
      <li class="bullet"><span class="icon"></span><span>{{bullet_1}}</span></li>
      {% endif %}
      {% if bullet_2 %}
      <li class="bullet"><span class="icon"></span><span>{{bullet_2}}</span></li>
      {% endif %}
      {% if bullet_3 %}
      <li class="bullet"><span class="icon"></span><span>{{bullet_3}}</span></li>
      {% endif %}
    </ul>

    <div class="footer">
      <span class="badge">{{brand_tagline | default: "yourbrand.com"}}</span>
      <span class="pagination"><span class="dot"></span>{{slide_number | default: 1}} / {{total_slides | default: 8}}</span>
    </div>
  </div>
</body>
</html>
